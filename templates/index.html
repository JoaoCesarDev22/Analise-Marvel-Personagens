<!doctype html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universo Marvel | Introdução</title>
    <style>
        :root {
            --fundo: #0f1115;
            --container: #161b22;
            --texto: #e6edf3;
            --texto-suave: #8b949e;
            --linha: #30363d;
            --marvel: #e21b22;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: var(--fundo);
            color: var(--texto);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            overflow: hidden;
        }

        .cena {
            position: relative;
            display: grid;
            min-height: 100vh;
            place-items: center;
            overflow: hidden;
            cursor: pointer;
            isolation: isolate;
            background:
                radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.14), transparent 32%),
                radial-gradient(circle at 80% 70%, rgba(63, 185, 80, 0.1), transparent 34%),
                var(--fundo);
        }

        .fundo-quadrinhos {
            position: absolute;
            inset: -12%;
            display: grid;
            grid-template-columns: repeat(6, minmax(140px, 1fr));
            gap: 18px;
            opacity: 0;
            transform: rotate(-7deg) scale(1.16);
            animation: quadros 5.2s ease forwards;
            z-index: -2;
        }

        .quadro {
            position: relative;
            min-height: 180px;
            overflow: hidden;
            border: 1px solid rgba(230, 237, 243, 0.08);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(88, 166, 255, 0.18), transparent 50%),
                linear-gradient(315deg, rgba(210, 153, 34, 0.16), transparent 42%),
                var(--container);
        }

        .quadro::before {
            content: attr(data-sigla);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(230, 237, 243, 0.1);
            font-size: clamp(2.4rem, 6vw, 7rem);
            font-weight: 900;
            transform: translateX(-18%);
            animation: sigla 4.8s ease forwards;
        }

        .quadro::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(230, 237, 243, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230, 237, 243, 0.04) 1px, transparent 1px);
            background-size: 18px 18px;
            mix-blend-mode: screen;
        }

        .palco {
            position: relative;
            display: grid;
            place-items: center;
            width: min(86vw, 840px);
            padding: 32px;
        }

        .logo-marvel {
            position: relative;
            display: grid;
            width: min(82vw, 760px);
            height: clamp(118px, 19vw, 190px);
            place-items: center;
            overflow: hidden;
            border-radius: 2px;
            background: var(--marvel);
            box-shadow: 0 34px 80px rgba(0, 0, 0, 0.42);
            opacity: 0;
            transform: scale(1.28);
            animation: logo 5.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-marvel::before {
            content: "";
            position: absolute;
            inset: -10%;
            background: linear-gradient(100deg, transparent 0%, transparent 34%, rgba(255, 255, 255, 0.86) 45%, transparent 57%, transparent 100%);
            transform: translateX(-120%);
            animation: brilho 5.2s ease forwards;
        }

        .logo-marvel span {
            position: relative;
            color: #ffffff;
            font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
            font-size: clamp(4.8rem, 17vw, 12.5rem);
            font-weight: 900;
            line-height: 0.86;
            letter-spacing: 0;
            text-transform: uppercase;
            transform: scaleX(0.82);
            text-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
            animation: letras 5.2s ease forwards;
        }

        .chamada {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(86vw, 720px);
            transform: translate(-50%, 170px);
            color: var(--texto);
            font-size: clamp(1rem, 2.4vw, 1.55rem);
            font-weight: 800;
            letter-spacing: 0;
            text-align: center;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: 0 18px 36px rgba(0, 0, 0, 0.8);
        }

        .cena.pronta .chamada {
            animation: piscar 1.1s ease-in-out infinite;
        }

        @keyframes quadros {
            0% {
                opacity: 0;
                transform: rotate(-7deg) scale(1.28) translateX(-8%);
            }
            20% {
                opacity: 0.78;
            }
            74% {
                opacity: 0.55;
            }
            100% {
                opacity: 0.18;
                transform: rotate(-7deg) scale(1.16) translateX(0);
            }
        }

        @keyframes sigla {
            0% {
                transform: translateX(-32%) scale(1.18);
                opacity: 0;
            }
            28% {
                opacity: 1;
            }
            100% {
                transform: translateX(10%) scale(1);
                opacity: 0.8;
            }
        }

        @keyframes logo {
            0% {
                opacity: 0;
                filter: blur(16px);
                transform: scale(1.4) translateY(28px);
            }
            24% {
                opacity: 1;
                filter: blur(0);
            }
            68% {
                transform: scale(1.03) translateY(0);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: scale(1) translateY(0);
            }
        }

        @keyframes brilho {
            0%,
            32% {
                transform: translateX(-120%);
            }
            74% {
                transform: translateX(120%);
            }
            100% {
                transform: translateX(120%);
            }
        }

        @keyframes letras {
            0% {
                transform: scaleX(1.08) translateY(18px);
                opacity: 0;
            }
            24% {
                opacity: 1;
            }
            100% {
                transform: scaleX(0.82) translateY(0);
                opacity: 1;
            }
        }

        @keyframes piscar {
            0%,
            100% {
                opacity: 0.22;
            }
            50% {
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            .fundo-quadrinhos {
                grid-template-columns: repeat(3, minmax(110px, 1fr));
                gap: 12px;
            }

            .palco {
                padding: 18px;
            }

            .chamada {
                transform: translate(-50%, 128px);
            }
        }
    </style>
</head>
<body>
    <main id="telaInicial" class="cena" tabindex="0" aria-label="Clique para iniciar o painel analítico Marvel">
        <div class="fundo-quadrinhos" aria-hidden="true">
            <div class="quadro" data-sigla="IM"></div>
            <div class="quadro" data-sigla="CA"></div>
            <div class="quadro" data-sigla="XM"></div>
            <div class="quadro" data-sigla="GG"></div>
            <div class="quadro" data-sigla="TH"></div>
            <div class="quadro" data-sigla="SW"></div>
            <div class="quadro" data-sigla="BP"></div>
            <div class="quadro" data-sigla="DS"></div>
            <div class="quadro" data-sigla="CM"></div>
            <div class="quadro" data-sigla="WV"></div>
            <div class="quadro" data-sigla="MG"></div>
            <div class="quadro" data-sigla="GR"></div>
        </div>

        <section class="palco" aria-hidden="true">
            <div class="logo-marvel">
                <span>Marvel</span>
            </div>
        </section>

        <div class="chamada">Clique em qualquer lugar para iniciar</div>
    </main>

    <script>
        const telaInicial = document.getElementById("telaInicial");

        window.setTimeout(() => {
            telaInicial.classList.add("pronta");
        }, 5400);

        function iniciarPainel() {
            window.location.href = "/painel";
        }

        telaInicial.addEventListener("click", iniciarPainel);
        telaInicial.addEventListener("keydown", (evento) => {
            if (evento.key === "Enter" || evento.key === " ") {
                evento.preventDefault();
                iniciarPainel();
            }
        });
    </script>
</body>
</html>
